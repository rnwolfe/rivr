name: Bug report
description: Something in rivr behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please **never paste real API keys/secrets** — redact and
        rotate them first (see SECURITY.md).
  - type: input
    id: version
    attributes:
      label: rivr version
      description: Output of `rivr version`
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Provider backend
      options: [serpapi, rainforest, creators, scrape, stub, n/a]
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: "Linux x86_64 / macOS arm64"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command
      description: The command you ran (redact secrets).
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected vs. what happened
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output / error
      description: Include the `--json` error body and exit code if relevant.
      render: shell
    validations:
      required: false
