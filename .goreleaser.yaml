version: 2

project_name: rivr

before:
  hooks:
    - go mod tidy

builds:
  - id: rivr
    main: ./cmd/rivr
    binary: rivr
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/rnwolfe/rivr/internal/version.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: rivr
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive

# Homebrew cask: enabled once the `rnwolfe/homebrew-tap` repo + GORELEASER_TOKEN secret
# exist (see README install + the cli-publish hand-back). Until then the release ships
# `go install` + downloadable binaries + checksums + SBOM + provenance. To enable, uncomment
# and ensure the token has write access to the tap repo.
# homebrew_casks:
#   - repository:
#       owner: rnwolfe
#       name: homebrew-tap
#       token: "{{ .Env.GORELEASER_TOKEN }}"
#     homepage: "https://github.com/rnwolfe/rivr"
#     description: "Agent-friendly CLI for Amazon Shopping search and data retrieval (read-only)."
#     hooks:
#       post:
#         install: |
#           if OS.mac?
#             system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/rivr"]
#           end

release:
  draft: false

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
