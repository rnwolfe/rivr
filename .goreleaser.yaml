version: 2

project_name: rivr

before:
  hooks:
    - go mod tidy

builds:
  - id: rivr
    main: ./cmd/rivr
    binary: rivr
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/rnwolfe/rivr/internal/version.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: rivr
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive

# Homebrew FORMULA → rnwolfe/homebrew-tap (Formula/rivr.rb). A formula (not a cask) so
# `brew install rnwolfe/tap/rivr` works on BOTH macOS and Linux — casks are macOS-only, which
# left Linux brew users unable to install. `brews:` is deprecated-but-functional in GoReleaser
# v2 (emits a warning); it's the only built-in path to a cross-platform Homebrew artifact, and
# it auto-generates the on_macos/on_linux + on_arm/on_intel blocks from the release archives.
# Requires a GORELEASER_TOKEN secret (PAT with contents:write on the tap repo).
brews:
  - name: rivr
    directory: Formula
    repository:
      owner: rnwolfe
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_TOKEN }}"
    homepage: "https://rivr.sh/"
    description: "Read-only Amazon Shopping CLI for AI agents"
    license: "MIT"
    install: |
      bin.install "rivr"
    test: |
      system "#{bin}/rivr", "version"

release:
  draft: false

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
